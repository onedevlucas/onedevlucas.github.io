<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BORail Line & Elevator Status</title>
  <link rel="icon" type="image/png" href="assets/images/branding/favicon.png">
  <link rel="stylesheet" href="assets/css/status.css">
</head>
<body>
  <header>
    <div class="wrap">
      <div class="title">BORail • Status</div>
      <div class="subtle">Live line conditions • Based on your local time • Tap a disrupted service to see details.</div>
    </div>
  </header>

  <main class="wrap">
    <section class="grid">
      <div class="card">
        <div class="name" style="margin-bottom:8px;">Line Status</div>
        <div id="statusList" class="status-list"></div>
      </div>

      <!-- Elevator Status (placeholder for later) -->
      <div class="card">
        <div class="name" style="margin-bottom:8px;">Elevator Status</div>
        <div class="subtle">We’ll add elevator outages here next.</div>
      </div>
    </section>
  </main>

  <!-- Bottom tab bar -->
  <nav class="tabbar" role="navigation" aria-label="Primary">
    <!-- Timetable -->
    <a href="index.html">
      <div class="item">
        <img src="assets/images/navigation/timetable.png" alt="" width="26" height="26" />
        <span>Timetable</span>
      </div>
    </a>
    <!-- Map -->
    <a href="map.html">
      <div class="item">
        <img src="assets/images/navigation/map.png" alt="" width="26" height="26" />
        <span>Map</span>
      </div>
    </a>
    <!-- Information (external) -->
    <a href="https://sites.google.com/view/borail-mc/home" target="_blank" rel="noopener">
      <div class="item">
        <img src="assets/images/navigation/information.png" alt="" width="26" height="26" />
        <span>Information</span>
      </div>
    </a>
    <!-- Status (current) -->
    <a class="active" href="status.html">
      <div class="item">
        <img src="assets/images/navigation/status.png" alt="" width="26" height="26" />
        <span>Status</span>
      </div>
    </a>
  </nav>
  <script src="assets/js/status.js"></script>
</body>
</html>
