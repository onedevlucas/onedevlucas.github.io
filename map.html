<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BORail System Map</title>
  <!-- (Optional) favicon to match index -->
  <link rel="icon" type="image/png" href="assets/images/branding/favicon.png">
  <link rel="stylesheet" href="assets/css/map.css">
</head>
<body>
  <header>
    <div class="wrap">
      <div class="bar">
        <!-- Removed the Home button -->
        <!-- Keep the "Open PDF" shortcut -->
        <div class="title">BORail System Maps</div>
      </div>
      <div class="muted">Tip: you can pinch-zoom or use your browser’s zoom to inspect details.</div>
    </div>
  </header>
  
  <main class="centerwrap">
  <div class="map-buttons">

    <!-- Day Time Map -->
    <div class="map-card">
      <a class="mapbtn" href="assets/maps/borail-flatlands-rush-hour-map.pdf" target="_blank" rel="noopener">Rush Hour Map</a>
      <div class="map-caption">6:00AM - 9:30AM & 5:00PM - 7:30PM Service Hours</div>
    </div>

    <!-- Night Time Map -->
    <div class="map-card">
      <a class="mapbtn" href="assets/maps/borail-flatlands-regular-service-map.pdf" target="_blank" rel="noopener">Regular Service Map</a>
      <div class="map-caption">9:30AM - 5:00PM & 7:30PM - 11:00PM Service Hours</div>
    </div>

    <!-- Route Map -->
    <div class="map-card">
      <a class="mapbtn" href="assets/maps/borail-flatlands-route-map.pdf" target="_blank" rel="noopener">Route Map</a>
      <div class="map-caption">In-Depth Concurrent Line Map</div>
    </div>

  </div>
</main>

  <!-- Inline PDF viewer -->
  

  <!-- Bottom tab bar -->
  <nav class="tabbar" role="navigation" aria-label="Primary">
    <!-- Timetable -->
    <a href="index.html">
      <div class="item">
        <img src="assets/images/navigation/timetable.png" alt="" width="26" height="26" />
        <span>Timetable</span>
      </div>
    </a>

    <!-- Map (current page) -->
    <a class="active" href="map.html">
      <div class="item">
        <img src="assets/images/navigation/map.png" alt="" width="26" height="26" />
        <span>Map</span>
      </div>
    </a>
    
    <!-- Information (external) -->
    <a href="https://sites.google.com/view/borail-mc/home" target="_blank" rel="noopener">
      <div class="item">
        <img src="assets/images/navigation/information.png" alt="" width="26" height="26" />
        <span>Information</span>
      </div>
    </a>

    <!-- Status (placeholder for now) -->
    <a href="status.html">
      <div class="item">
        <img src="assets/images/navigation/status.png" alt="" width="26" height="26" />
        <span>Status</span>
      </div>
    </a>
  </nav>
</body>
</html>
